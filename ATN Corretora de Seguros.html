  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

c-bezier(0.76,0,0.24,1) forwards;\n}\n@keyframes introSlide {\n  from { transform: translateY(0); }\n  to   { transform: translateY(-100%); }\n}\n.intro-inner {\n  position: relative;\n  overflow: hidden;\n  padding: 10px 20px;\n}\n.intro-logo {\n  width: 300px;\n  opacity: 0;\n  transform: scale(0.94);\n  filter: brightness(1.1);\n  animation: logoReveal 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.4s forwards;\n}\n@keyframes logoReveal {\n  to { opacity: 1; transform: scale(1); }\n}\n.intro-sweep {\n  position: absolute; inset: 0;\n  background: linear-gradient(105deg, transparent 30%, rgba(234,195,92,0.55) 50%, transparent 70%);\n  transform: translateX(-150%);\n  animation: sweep 0.7s ease-in-out 1.1s forwards;\n}\n@keyframes sweep { to { transform: translateX(200%); } }\n.intro-line {\n  width: 0;\n  height: 1px;\n  background: linear-gradient(90deg, transparent, var(--gold), transparent);\n  margin-top: 18px;\n  animation: lineGrow 0.6s ease-out 1.9s forwards;\n}\n@keyframes lineGrow { to { width: 300px; } }\n\n/* ── CURSOR ─────────────────────────────────────────────────── */\n.cur-dot {\n  position: fixed; z-index: 9000; pointer-events: none;\n  width: 7px; height: 7px;\n  background: var(--gold);\n  border-radius: 50%;\n  transform: translate(-50%,-50%);\n  transition: opacity 0.2s, transform 0.1s;\n  mix-blend-mode: screen;\n}\n.cur-ring {\n  position: fixed; z-index: 8999; pointer-events: none;\n  width: 36px; height: 36px;\n  border: 1.5px solid rgba(234,195,92,0.5);\n  border-radius: 50%;\n  transform: translate(-50%,-50%);\n  transition: width 0.3s, height 0.3s, opacity 0.3s;\n}\nbody:not(.cursor-ready) .cur-dot,\nbody:not(.cursor-ready) .cur-ring { opacity: 0; }\nbody[data-theme=\"light\"] .cur-dot { mix-blend-mode: multiply; }\n\n/* ── PROGRESS BAR ──────────────────────────────────────────── */\n#progress-bar {\n  position: fixed; top: 0; left: 0; z-index: 200;\n  height: 2px; width: 0%;\n  background: linear-gradient(90deg, var(--gold-d), var(--gold), var(--gold-l));\n  transition: width 0.1s linear;\n  box-shadow: 0 0 10px var(--gold);\n}\n\n/* ── NAV ───────────────────────────────────────────────────── */\nnav {\n  position: fixed; top: 0; left: 0; right: 0; z-index: 100;\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 0 5vw;\n  height: 70px;\n  background: rgba(8,8,7,0.85);\n  backdrop-filter: blur(20px) saturate(1.4);\n  border-bottom: 1px solid var(--border);\n  transition: var(--transition);\n}\n[data-theme=\"light\"] nav {\n  background: rgba(243,239,230,0.9);\n}\nnav.scrolled {\n  height: 60px;\n  box-shadow: 0 4px 30px rgba(0,0,0,0.3);\n}\n.nav-logo-wrap {\n  display: flex; align-items: center; flex-shrink: 0;\n}\n.nav-logo-wrap img {\n  height: 40px; width: auto;\n}\n[data-theme=\"light\"] .nav-logo-wrap img.logo-dark { display: none; }\n[data-theme=\"light\"] .nav-logo-wrap img.logo-light { display: block !important; }\n.nav-logo-wrap img.logo-light { display: none; }\n[data-theme=\"light\"] .footer-logo-dark { display: none !important; }\n[data-theme=\"light\"] .footer-logo-light { display: block !important; }\n\n.nav-links {\n  display: flex; gap: 2.2rem;\n  list-style: none;\n  font-size: 0.7rem;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n}\n.nav-links a { color: var(--fg2); transition: color 0.2s; }\n.nav-links a:hover { color: var(--gold); }\n.nav-right { display: flex; align-items: center; gap: 1rem; }\n.theme-toggle {\n  width: 38px; height: 22px;\n  border-radius: 11px;\n  background: var(--bg3);\n  border: 1px solid var(--border2);\n  cursor: pointer;\n  position: relative;\n  transition: background 0.3s;\n  flex-shrink: 0;\n}\n.theme-toggle::after {\n  content: '';\n  position: absolute; top: 3px; left: 3px;\n  width: 14px; height: 14px;\n  border-radius: 50%;\n  background: var(--gold);\n  transition: transform 0.3s;\n}\n[data-theme=\"light\"] .theme-toggle::after { transform: translateX(16px); }\n.nav-cta {\n  font-family: var(--font-h);\n  letter-spacing: 0.1em;\n  font-size: 0.85rem;\n  background: linear-gradient(135deg, var(--gold-d), var(--gold));\n  color: #000;\n  padding: 9px 22px;\n  border-radius: 2px;\n  border: none;\n  cursor: pointer;\n  white-space: nowrap;\n  transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;\n}\n.nav-cta:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(234,195,92,0.35); }\n.nav-burger { display: none; cursor: pointer; flex-direction: column; gap: 5px; }\n.nav-burger span { display: block; width: 22px; height: 1.5px; background: var(--gold); transition: var(--transition); }\n\n/* ── HERO ──────────────────────────────────────────────────── */\n.hero {\n  min-height: 100vh;\n  display: flex; flex-direction: column; justify-content: center;\n  padding: 100px 6vw 80px;\n  position: relative; overflow: hidden;\n}\n#hero-canvas {\n  position: absolute; inset: 0; z-index: 0;\n  opacity: 0.5;\n}\n[data-theme=\"light\"] #hero-canvas { opacity: 0.25; }\n\n.hero-content { position: relative; z-index: 1; }\n.hero-eyebrow {\n  display: flex; align-items: center; gap: 14px;\n  font-family: var(--font-h);\n  font-size: 0.78rem;\n  letter-spacing: 0.35em;\n  color: var(--gold-d);\n  margin-bottom: 2rem;\n  opacity: 0; transform: translateY(16px);\n  animation: fadeUp 0.7s ease-out 2.7s forwards;\n}\n.hero-eyebrow .line { width: 44px; height: 1px; background: var(--gold-d); }\n\n.hero-title {\n  font-family: var(--font-h);\n  font-size: clamp(3.6rem, 9vw, 9.5rem);\n  line-height: 0.92;\n  letter-spacing: 0.02em;\n  text-transform: uppercase;\n  max-width: 14ch;\n  color: var(--fg);\n}\n.hero-title .word {\n  display: block;\n  overflow: hidden;\n}\n.hero-title .word span {\n  display: block;\n  opacity: 0; transform: translateY(100%);\n}\n.hero-title .word:nth-child(1) span { animation: wordUp 0.8s cubic-bezier(0.16,1,0.3,1) 2.9s forwards; }\n.hero-title .word:nth-child(2) span { animation: wordUp 0.8s cubic-bezier(0.16,1,0.3,1) 3.05s forwards; }\n.hero-title .word:nth-child(3) span { animation: wordUp 0.8s cubic-bezier(0.16,1,0.3,1) 3.2s forwards; }\n@keyframes wordUp { to { opacity: 1; transform: translateY(0); } }\n@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }\n\n.hero-title em {\n  font-style: normal;\n  background: linear-gradient(135deg, var(--gold-d), var(--gold), var(--gold-l));\n  -webkit-background-clip: text;\n  -webkit-text-fill-color: transparent;\n  background-clip: text;\n  background-size: 200%;\n  animation: shimmer 4s ease-in-out 3.5s infinite;\n}\n@keyframes shimmer {\n  0%, 100% { background-position: 0% 50%; }\n  50% { background-position: 100% 50%; }\n}\n[data-theme=\"light\"] .hero-title { color: var(--fg); }\n\n.hero-sub {\n  margin-top: 2.4rem;\n  max-width: 50ch;\n  color: var(--fg2);\n  font-size: 0.93rem;\n  font-weight: 300;\n  line-height: 1.85;\n  opacity: 0; transform: translateY(16px);\n  animation: fadeUp 0.7s ease-out 3.3s forwards;\n}\n.hero-actions {\n  margin-top: 2.8rem;\n  display: flex; gap: 1.2rem; flex-wrap: wrap;\n  opacity: 0; transform: translateY(16px);\n  animation: fadeUp 0.7s ease-out 3.5s forwards;\n}\n.btn-primary {\n  font-family: var(--font-h);\n  letter-spacing: 0.12em; font-size: 0.95rem;\n  background: linear-gradient(135deg, var(--gold-d), var(--gold));\n  color: #000;\n  padding: 15px 38px; border-radius: 2px;\n  border: none; cursor: pointer;\n  position: relative; overflow: hidden;\n  transition: transform 0.2s, box-shadow 0.2s;\n}\n.btn-primary::after {\n  content: '';\n  position: absolute; inset: 0;\n  background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.3) 50%, transparent 70%);\n  transform: translateX(-150%);\n  transition: transform 0.5s;\n}\n.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(234,195,92,0.4); }\n.btn-primary:hover::after { transform: translateX(150%); }\n.btn-outline {\n  font-family: var(--font-h);\n  letter-spacing: 0.12em; font-size: 0.95rem;\n  background: transparent;\n  color: var(--gold);\n  padding: 14px 38px; border-radius: 2px;\n  border: 1px solid var(--gold-d);\n  cursor: pointer;\n  transition: background 0.2s, transform 0.2s, box-shadow 0.2s;\n}\n.btn-outline:hover { background: rgba(167,130,69,0.1); transform: translateY(-2px); }\n\n.hero-stats {\n  margin-top: 5rem;\n  display: flex; gap: 4rem; flex-wrap: wrap;\n  border-top: 1px solid var(--border);\n  padding-top: 2.4rem;\n  opacity: 0; transform: translateY(16px);\n  animation: fadeUp 0.7s ease-out 3.7s forwards;\n}\n.hero-stat .num {\n  font-family: var(--font-h);\n  font-size: 3rem;\n  color: var(--gold);\n  letter-spacing: 0.04em;\n  line-height: 1;\n}\n.hero-stat .desc {\n  font-size: 0.68rem;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--fg2);\n  margin-top: 4px;\n}\n\n/* ── SCROLL REVEAL ──────────────────────────────────────────── */\n.reveal {\n  opacity: 0; transform: translateY(36px);\n  transition: opacity 0.75s cubic-bezier(0.16,1,0.3,1), transform 0.75s cubic-bezier(0.16,1,0.3,1);\n}\n.reveal.visible { opacity: 1; transform: translateY(0); }\n.reveal-left { opacity: 0; transform: translateX(-40px); transition: opacity 0.75s cubic-bezier(0.16,1,0.3,1), transform 0.75s cubic-bezier(0.16,1,0.3,1); }\n.reveal-left.visible { opacity: 1; transform: translateX(0); }\n.reveal-right { opacity: 0; transform: translateX(40px); transition: opacity 0.75s cubic-bezier(0.16,1,0.3,1), transform 0.75s cubic-bezier(0.16,1,0.3,1); }\n.reveal-right.visible { opacity: 1; transform: translateX(0); }\n[class*=\"delay-1\"] { transition-delay: 0.1s !important; }\n[class*=\"delay-2\"] { transition-delay: 0.2s !important; }\n[class*=\"delay-3\"] { transition-delay: 0.3s !important; }\n[class*=\"delay-4\"] { transition-delay: 0.4s !important; }\n\n/* ── SECTIONS ──────────────────────────────────────────────── */\nsection { padding: 110px 6vw; }\n.sec-label {\n  font-family: var(--font-h);\n  font-size: 0.75rem;\n  letter-spacing: 0.35em;\n  .prod-tab, .contact-card, .theme-toggle').forEach(el => {\n  el.addEventListener('mouseenter', () => {\n    ring.style.width = '56px'; ring.style.height = '56px';\n    dot.style.transform = 'translate(-50%,-50%) scale(0.4)';\n  });\n  el.addEventListener('mouseleave', () => {\n    ring.style.width = '36px'; ring.style.height = '36px';\n    dot.style.transform = 'translate(-50%,-50%) scale(1)';\n  });\n});\n\n// ── PROGRESS BAR ─────────────────────────────────────────────\nconst pb = document.getElementById('progress-bar');\nwindow.addEventListener('scroll', () => {\n  const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;\n  pb.style.width = pct + '%';\n});\n\n// ── NAV SCROLL ────────────────────────────────────────────────\nwindow.addEventListener('scroll', () => {\n  document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 60);\n});\n\n// ── HERO CANVAS PARTICLES ────────────────────────────────────\n(function() {\n  const canvas = document.getElementById('hero-canvas');\n  const ctx = canvas.getContext('2d');\n  let W, H, particles = [];\n  function resize() {\n    W = canvas.width = canvas.offsetWidth;\n    H = canvas.height = canvas.offsetHeight;\n  }\n  resize();\n  window.addEventListener('resize', resize);\n\n  const isDark = () => document.documentElement.getAttribute('data-theme') !== 'light';\n  const N = Math.min(80, Math.floor((W * H) / 12000));\n  for (let i = 0; i < N; i++) {\n    particles.push({\n      x: Math.random() * 2000, y: Math.random() * 1200,\n      vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,\n      r: Math.random() * 2 + 0.5\n    });\n  }\n  let mouseX = W / 2, mouseY = H / 2;\n  document.addEventListener('mousemove', e => {\n    const r = canvas.getBoundingClientRect();\n    mouseX = e.clientX - r.left; mouseY = e.clientY - r.top;\n  });\n\n  function draw() {\n    ctx.clearRect(0, 0, W, H);\n    const gold = isDark() ? 'rgba(234,195,92,' : 'rgba(120,80,20,';\n    particles.forEach(p => {\n      p.x += p.vx + (mouseX - p.x) * 0.00006;\n      p.y += p.vy + (mouseY - p.y) * 0.00006;\n      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;\n      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;\n      ctx.beginPath();\n      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);\n      ctx.fillStyle = gold + '0.7)';\n      ctx.fill();\n    });\n    for (let i = 0; i < particles.length; i++) {\n      for (let j = i + 1; j < particles.length; j++) {\n        const dx = particles[i].x - particles[j].x;\n        const dy = particles[i].y - particles[j].y;\n        const dist = Math.sqrt(dx * dx + dy * dy);\n        if (dist < 140) {\n          ctx.beginPath();\n          ctx.moveTo(particles[i].x, particles[i].y);\n          ctx.lineTo(particles[j].x, particles[j].y);\n          ctx.strokeStyle = gold + (0.18 * (1 - dist / 140)) + ')';\n          ctx.lineWidth = 0.6;\n          ctx.stroke();\n        }\n      }\n    }\n    requestAnimationFrame(draw);\n  }\n  draw();\n})();\n\n// ── COUNTERS ──────────────────────────────────────────────────\nfunction easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }\nfunction animateCounter(el) {\n  const target = parseInt(el.dataset.count);\n  const suffix = el.dataset.suffix || (target === 35 ? '+' : target === 100 ? '%' : target === 24 ? 'h' : '+');\n  const dur = 1600, start = performance.now();\n  function step(now) {\n    const t = Math.min((now - start) / dur, 1);\n    el.textContent = Math.round(easeOutQuart(t) * target) + suffix;\n    if (t < 1) requestAnimationFrame(step);\n  }\n  requestAnimationFrame(step);\n}\nconst counterObs = new IntersectionObserver(entries => {\n  entries.forEach(e => {\n    if (e.isIntersecting && !e.target.dataset.counted) {\n      e.target.dataset.counted = '1';\n      animateCounter(e.target);\n    }\n  });\n}, { threshold: 0.5 });\ndocument.querySelectorAll('[data-count]').forEach(el => counterObs.observe(el));\n\n// ── SCROLL REVEALS ────────────────────────────────────────────\nconst revealObs = new IntersectionObserver(entries => {\n  entries.forEach(e => {\n    if (e.isIntersecting) {\n      e.target.classList.add('visible');\n      revealObs.unobserve(e.target);\n    }\n  });\n}, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });\ndocument.querySelectorAll('.reveal, .reveal-left, .reveal-right').forEach(el => revealObs.observe(el));\n\n// ── 3D TILT ───────────────────────────────────────────────────\ndocument.querySelectorAll('.tilt').forEach(card => {\n  card.addEventListener('mousemove', e => {\n    const r = card.getBoundingClientRect();\n    const x = (e.clientX - r.left) / r.width - 0.5;\n    const y = (e.clientY - r.top) / r.height - 0.5;\n    card.style.transform = `perspective(600px) rotateY(${x * 8}deg) rotateX(${-y * 8}deg) translateZ(8px)`;\n  });\n  card.addEventListener('mouseleave', () => {\n    card.style.transform = '';\n  });\n});\n\n// ── MARQUEE ───────────────────────────────────────────────────\nconst partners = ['Unisaúde','MetLife','Azos','SulAmérica','Tokio Marine','Icatu','Porto Seguro','Zurich','Ademicon','Bradesco','Mapfre','Prudential','MAG','Apollo','Allianz','Azul Seguros','Itaú','Mitsui','Suhai','PetLove','AKAD','AXA','AIG','Darwin Seguros','Ezze Seguros','Ituran','Justos','BP Seguradora','Sancor','Centauro','KOVR','Sombrero','Swiss Re','Justus Seguros','AVLA','Yellum','Daycoval Seguros'];\nconst track = document.getElementById('marqueeTrack');\nconst double = [...partners, ...partners];\ndouble.forEach(name => {\n  const chip = document.createElement('div');\n  chip.className = 'marquee-chip';\n  chip.textContent = name;\n  track.appendChild(chip);\n});\n\n// ── TABS ──────────────────────────────────────────────────────\nfunction showTab(id, btn) {\n  document.querySelectorAll('.prod-panel').forEach(p => p.classList.remove('active'));\n  document.querySelectorAll('.prod-tab').forEach(t => t.classList.remove('active'));\n  document.getElementById('panel-' + id).classList.add('active');\n  btn.classList.add('active');\n  // Re-observe tilt cards in new panel\n  document.querySelectorAll('#panel-' + id + ' .tilt').forEach(card => {\n    card.style.transform = '';\n  });\n}\n\n// ── THEME TOGGLE ──────────────────────────────────────────────\nconst toggleBtn = document.getElementById('themeToggle');\nconst html = document.documentElement;\nfunction setTheme(t) {\n  html.setAttribute('data-theme', t);\n  localStorage.setItem('atn-theme', t);\n}\ntoggleBtn.addEventListener('click', () => {\n  setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');\n});\nconst saved = localStorage.getItem('atn-theme');\nif (saved) setTheme(saved);\n\n// ── MOBILE MENU ───────────────────────────────────────────────\ndocument.getElementById('burger').addEventListener('click', () => document.getElementById('mobileMenu').classList.add('open'));\ndocument.getElementById('mobileClose').addEventListener('click', closeMobile);\nfunction closeMobile() { document.getElementById('mobileMenu').classList.remove('open'); }\n\n// ── TWEAKS ────────────────────────────────────────────────────\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"accentColor\": \"#EAC35C\",\n  \"theme\": \"dark\"\n}/*EDITMODE-END*/;\n\nconst tweakPanel = document.createElement('div');\ntweakPanel.id = 'tweak-panel';\ntweakPanel.style.cssText = `display:none;position:fixed;bottom:100px;right:24px;z-index:9999;background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:20px 22px;width:230px;font-family:'Montserrat',sans-serif;font-size:13px;color:var(--fg);box-shadow:0 8px 40px rgba(0,0,0,0.5);`;\ntweakPanel.innerHTML = `<div style=\"font-family:'Bebas Neue',sans-serif;letter-spacing:.12em;font-size:1.1rem;color:var(--gold);margin-bottom:14px;\">Tweaks<\u002Fdiv>\n<label style=\"display:block;margin-bottom:6px;color:var(--fg2);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;\">Cor Dourada<\u002Flabel>\n<input type=\"color\" id=\"tk-accent\" value=\"${TWEAK_DEFAULTS.accentColor}\" style=\"width:100%;height:30px;border:none;background:none;cursor:none;margin-bottom:14px;\" />\n<label style=\"display:block;margin-bottom:6px;color:var(--fg2);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;\">Tema<\u002Flabel>\n<select id=\"tk-theme\" style=\"width:100%;background:var(--bg3);color:var(--fg);border:1px solid var(--border2);padding:7px;border-radius:2px;cursor:none;\">\n  <option value=\"dark\">Escuro<\u002Foption>\n  <option value=\"light\">Claro<\u002Foption>\n<\u002Fselect>`;\ndocument.body.appendChild(tweakPanel);\ndocument.getElementById('tk-theme').value = html.getAttribute('data-theme');\ndocument.getElementById('tk-accent').addEventListener('input', e => {\n  document.documentElement.style.setProperty('--gold', e.target.value);\n  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{accentColor: e.target.value}}, '*');\n});\ndocument.getElementById('tk-theme').addEventListener('change', e => {\n  setTheme(e.target.value);\n  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{theme: e.target.value}}, '*');\n});\nwindow.addEventListener('message', e => {\n  if (e.data?.type === '__activate_edit_mode') tweakPanel.style.display = 'block';\n  if (e.data?.type === '__deactivate_edit_mode') tweakPanel.style.display = 'none';\n});\nwindow.parent.postMessage({type:'__edit_mode_available'}, '*');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
